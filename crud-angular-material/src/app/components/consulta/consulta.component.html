<div fxLayout="row" fxLayoutAlign="center">
  <div fxLayout="column" fxFlex="900px">
    <div fxLayout="column" fxFlex="1000">
    <form action="" class="mt-60" #buscaForm="ngForm">
      <mat-card appearance="outlined" class="p-2">
        <mat-card-header >
          <mat-card-title>
            Consulta
          </mat-card-title>
        </mat-card-header>
        <mat-card-content class="mt-20">
          <div fxLayout="row">
            <div fxLayout="column" fxFlex="100%">
              <mat-form-field class="full-width">
                <mat-label>
                  Nome:
                </mat-label>
                <input matInput placeholder="ex: José"/>
              </mat-form-field>
            </div>
          </div>
        </mat-card-content>
        <mat-card-actions>
          <button type="submit" mat-flat-button color="primary">
            <mat-icon fontIcon="search"/>
            Pesquisar
          </button>
        </mat-card-actions>
      </mat-card>
    </form>
  </div>
  </div>
</div>
